<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/fragments/head :: clientHead('게임 설정 - Song Quiz')}"></head>
<body class="client-page">
<div class="client-container">
    <header class="client-header compact">
        <nav class="header-nav">
            <a href="/" class="btn-home">🏠 홈</a>
        </nav>
        <h1>🎤 게임 진행용</h1>
        <p>친구들과 함께 노래 맞추기!</p>
    </header>

    <main class="setup-main">
        <div class="setup-card">
            <div class="setup-step" id="step1">
                <h2>1. 기본 설정</h2>

                <div class="host-settings-row">
                    <div class="form-group" id="playerSettingArea">
                        <label>진행 인원</label>
                        <div class="round-input-group">
                            <button type="button" class="round-adjust-btn" onclick="changePlayerCount(-1)">−</button>
                            <input type="number" id="playerCountInput" value="2" min="2" max="10" class="round-input">
                            <button type="button" class="round-adjust-btn" onclick="changePlayerCount(1)">+</button>
                        </div>
                    </div>

                    <div class="form-group" id="roundSettingArea">
                        <label>진행 라운드 <span id="songCountInfo" class="song-count-info"></span></label>
                        <div class="round-input-group">
                            <button type="button" class="round-adjust-btn" onclick="adjustRounds(-1)">−</button>
                            <input type="number" id="totalRoundsInput" value="10" min="1" max="50" class="round-input">
                            <button type="button" class="round-adjust-btn" onclick="adjustRounds(1)">+</button>
                        </div>
                        <div class="round-presets">
                            <button type="button" class="preset-btn" onclick="setRounds(5)">5</button>
                            <button type="button" class="preset-btn active" onclick="setRounds(10)">10</button>
                            <button type="button" class="preset-btn" onclick="setRounds(15)">15</button>
                            <button type="button" class="preset-btn" onclick="setRounds(20)">20</button>
                        </div>
                    </div>
                </div>

                <!-- 게임 모드 선택 (간소화) -->
                <div class="form-group">
                    <label>게임 모드</label>
                    <div class="mode-options-simple">
                        <label class="mode-option-simple">
                            <input type="radio" name="gameMode" value="RANDOM" checked>
                            <span>전체 랜덤</span>
                        </label>
                        <label class="mode-option-simple">
                            <input type="radio" name="gameMode" value="RETRO">
                            <span>레트로</span>
                        </label>
                    </div>
                </div>

                <!-- 필터 섹션 (접기/펼치기) -->
                <div class="filter-section" id="filterSection">
                    <button type="button" class="filter-toggle-btn" onclick="toggleFilterSection()">
                        <span class="filter-toggle-icon">▶</span>
                        <span class="filter-toggle-text">필터 (선택사항)</span>
                        <span class="filter-active-badge" id="filterActiveBadge" style="display:none;">적용중</span>
                    </button>

                    <div class="filter-content" id="filterContent" style="display:none;">
                        <!-- 장르 필터 -->
                        <div class="filter-item">
                            <label>장르</label>
                            <select id="fixedGenreId" class="filter-select">
                                <option value="">전체</option>
                                <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}"></option>
                            </select>
                        </div>

                        <!-- 연도 필터 -->
                        <div class="filter-item">
                            <label>연도 <span id="yearSelectCountInfo" class="filter-count-info"></span></label>
                            <div class="multi-select-chips compact" id="yearSelectChips">
                                <div class="chips-loading">로딩 중...</div>
                            </div>
                        </div>

                        <!-- 아티스트 유형 (1차 필터) -->
                        <div class="filter-item">
                            <label>아티스트 유형</label>
                            <div class="filter-type-options">
                                <label class="filter-type-option">
                                    <input type="radio" name="artistType" value="all" checked>
                                    <span>전체</span>
                                </label>
                                <label class="filter-type-option">
                                    <input type="radio" name="artistType" value="solo">
                                    <span>솔로</span>
                                </label>
                                <label class="filter-type-option">
                                    <input type="radio" name="artistType" value="group">
                                    <span>그룹</span>
                                </label>
                            </div>
                        </div>

                        <!-- 아티스트 선택 (2차 필터) -->
                        <div class="filter-item">
                            <label>아티스트 선택 <span id="artistSelectCountInfo" class="filter-count-info"></span></label>
                            <input type="text" id="artistSearchInput" placeholder="아티스트명 검색..." class="filter-search-input" autocomplete="off">
                            <div class="multi-select-chips compact" id="artistSelectChips">
                                <div class="chips-loading">로딩 중...</div>
                            </div>
                        </div>

                        <!-- 필터 초기화 버튼 -->
                        <button type="button" class="filter-reset-btn" onclick="resetFilters()">필터 초기화</button>
                    </div>
                </div>

                <!-- 매 라운드 선택 모드 -->
                <div class="form-group">
                    <label>매 라운드 선택 모드</label>
                    <div class="per-round-options">
                        <label class="per-round-option">
                            <input type="radio" name="gameMode" value="GENRE_PER_ROUND">
                            <span class="per-round-label">장르</span>
                        </label>
                        <label class="per-round-option">
                            <input type="radio" name="gameMode" value="YEAR_PER_ROUND">
                            <span class="per-round-label">연도</span>
                        </label>
                        <label class="per-round-option">
                            <input type="radio" name="gameMode" value="ARTIST_PER_ROUND">
                            <span class="per-round-label">아티스트</span>
                        </label>
                    </div>
                    <small class="per-round-desc">매 라운드마다 직접 선택하여 출제</small>
                </div>

                <!-- 매 라운드 옵션 -->
                <div class="form-group mode-selection-area" id="perRoundOptions" style="display:none;">
                    <div class="checkbox-option">
                        <label class="toggle-option">
                            <input type="checkbox" id="hideEmptyGenres">
                            <span class="toggle-label">선택 가능한 항목만 표시</span>
                        </label>
                    </div>
                </div>

                <div class="step-buttons">
                    <button type="button" class="btn btn-next" onclick="goToStep2()">다음 →</button>
                </div>
            </div>

            <div class="setup-step" id="step2" style="display:none;">
                <h2>2. 플레이어 입력</h2>

                <div class="players-input" id="playersInput">
                    <!-- 동적으로 생성 -->
                </div>

                <div class="step-buttons">
                    <button type="button" class="btn btn-back" onclick="goToStep1()">← 이전</button>
                    <button type="button" class="btn btn-start" onclick="startGame()">게임 시작! 🎮</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/client/game-host-setup.js}"></script>
</body>
</html>
